name: ci / cd

# on:
#   push:
#     branches: [main]

jobs:
  smoketest:
    uses: ./.github/workflows/smoketest.yml

  ci:
    runs-on: ubuntu-latest
    needs:
      - smoketest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Set environment variables
        run: echo "VITE_API_BASE_URL=http://localhost:8000" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: npm run coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5.1.0
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    permissions:
      contents: write  # Required to create release and push tags
    needs:
      - ci
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Needed to push tags

      - name: Fetch all tags
        run: git fetch --tags

      - name: Calculate Next Version
        id: version
        run: |
          latest_tag=$(git describe --tags `git rev-list --tags --max-count=1`)
          echo "Latest tag: $latest_tag"
          
          if [[ -z "$latest_tag" ]]; then
            next_tag="v1.0.0"
          else
            version=${latest_tag#v}
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
            next_tag="v${major}.${minor}.${patch}"
          fi
          
          echo "Next tag: $next_tag"
          echo "VERSION=$next_tag" >> $GITHUB_ENV
       
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: salob79/bp-frontend:${{ env.VERSION }},salob79/bp-frontend:latest

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: salob79/bp-frontend:latest

      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $VERSION
          git push origin $VERSION

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: success() # Only log in if the scan passes
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: salob79/bp-frontend:${{ env.VERSION }},salob79/bp-frontend:latest

  IaC:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger and wait for bp-iac workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            // 1. Dispatch the bp-iac workflow
            const dispatchResponse = await github.rest.actions.createWorkflowDispatch({
              owner: 'sianob',
              repo: 'bp-iac',
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                environment: 'staging',
                action: 'create'
              }
            });

            console.log('Workflow dispatch triggered.');

            // 2. Wait a few seconds because the new run isn't immediately available
            await new Promise(resolve => setTimeout(resolve, 10000)); // 10 seconds

            // 3. Find the latest workflow run
            let runId;
            const maxAttempts = 30; // Max polling attempts (e.g., 30*10s = 5 minutes timeout)
            const delay = 10000; // 10 seconds
            let attempt = 0;

            while (attempt < maxAttempts) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: 'sianob',
                repo: 'bp-iac',
                workflow_id: 'deploy.yml',
                branch: 'main',
                event: 'workflow_dispatch'
              });

              if (runs.data.workflow_runs.length > 0) {
                runId = runs.data.workflow_runs[0].id;
                console.log(`Found workflow run ID: ${runId}`);
                break;
              }

              console.log('Workflow run not found yet, retrying...');
              await new Promise(resolve => setTimeout(resolve, delay));
              attempt++;
            }

            if (!runId) {
              throw new Error('Failed to find triggered workflow run.');
            }

            // 4. Now poll until the workflow run completes
            let completed = false;

            while (!completed && attempt < maxAttempts) {
              const run = await github.rest.actions.getWorkflowRun({
                owner: 'sianob',
                repo: 'bp-iac',
                run_id: runId
              });

              console.log(`Current status: ${run.data.status}, conclusion: ${run.data.conclusion}`);

              if (run.data.status === 'completed') {
                completed = true;
                if (run.data.conclusion !== 'success') {
                  throw new Error(`bp-iac workflow failed with conclusion: ${run.data.conclusion}`);
                } else {
                  console.log('bp-iac workflow succeeded!');
                }
              } else {
                console.log('Workflow still running, waiting...');
                await new Promise(resolve => setTimeout(resolve, delay));
                attempt++;
              }
            }

            if (!completed) {
              throw new Error('Timed out waiting for bp-iac workflow to complete.');
            }

  Deploy-to-Staging:
    needs: IaC
    runs-on: ubuntu-latest
    steps:
      - name: Deploy-to-Staging
        id: trigger_deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const repo = 'bp-deploy';
            const owner = 'sianob';
            const workflow_id = 'deploy.yml';
            const ref = 'main';

            // Trigger the workflow
            const dispatch = await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref,
              inputs: {
                environment: 'staging',
              }
            });

            console.log(`Triggered workflow '${workflow_id}' in ${repo}`);

            // Wait a few seconds before polling
            await new Promise(r => setTimeout(r, 10000));

            // Poll for the latest run
            const maxRetries = 40;
            const delay = 15000; // 15s between checks

            let runId;
            let found = false;
            let attempt = 0;

            while (attempt < maxRetries) {
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                event: 'workflow_dispatch',
                status: 'in_progress'
              });

              if (runs.workflow_runs.length > 0) {
                runId = runs.workflow_runs[0].id;
                console.log(`Found run ID: ${runId}`);
                found = true;
                break;
              }

              console.log('Waiting for workflow run to start...');
              await new Promise(r => setTimeout(r, delay));
              attempt++;
            }

            if (!found) {
              throw new Error('Timed out waiting for triggered workflow to start.');
            }

            // Wait for completion
            let done = false;
            while (!done) {
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: runId
              });

              if (run.status === 'completed') {
                console.log(`Workflow finished with conclusion: ${run.conclusion}`);
                if (run.conclusion !== 'success') {
                  throw new Error(`Workflow failed with conclusion: ${run.conclusion}`);
                }
                done = true;
              } else {
                console.log(`Workflow still running... (${run.status})`);
                await new Promise(r => setTimeout(r, delay));
              }
            }
