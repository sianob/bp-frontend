name: Frontend CI/CD

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string

jobs:
  smoketest:
    uses: ./.github/workflows/smoketest.yml
    with:
      secrets:
        GH_PAT: ${{ secrets.GH_PAT }} 

  ci:
    runs-on: ubuntu-latest
    needs:
      - smoketest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: sianob/bp-frontend
          ref: ${{ github.head_ref || github.ref_name }}                  # Replace with the branch where this workflow resides
          token: ${{ secrets.GH_PAT }} # Needed to access private repos
          path: frontend
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Set environment variables
        run: echo "VITE_API_BASE_URL=http://localhost:8000" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: npm run coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5.1.0
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    permissions:
      contents: write  # Required to create release and push tags
    needs:
      - ci
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: sianob/bp-frontend
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT }} # Needed to access private repos
          path: frontend
      - name: Fetch all tags
        run: git fetch --tags

      - name: Calculate Next Version
        id: version
        run: |
          latest_tag=$(git describe --tags `git rev-list --tags --max-count=1`)
          echo "Latest tag: $latest_tag"
          
          if [[ -z "$latest_tag" ]]; then
            next_tag="v1.0.0"
          else
            version=${latest_tag#v}
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
            next_tag="v${major}.${minor}.${patch}"
          fi
          
          echo "Next tag: $next_tag"
          echo "VERSION=$next_tag" >> $GITHUB_ENV
       
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: salob79/bp-frontend:${{ env.VERSION }},salob79/bp-frontend:latest

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: salob79/bp-frontend:latest

      - name: Create Git Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $VERSION
          git push origin $VERSION

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          repository: sianobg/bp-frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: success() # Only log in if the scan passes
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: salob79/bp-frontend:${{ env.VERSION }},salob79/bp-frontend:latest
