name: ci

on:
  push:
    branches: [main]

jobs:
  smoketest:
    uses: ./.github/workflows/smoketest.yml

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Set environment variables
        run: echo "VITE_API_BASE_URL=http://localhost:8000" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage report to SonarQube
        uses: SonarSource/sonarqube-scan-action@v5.1.0
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    needs:
      - smoketest
      - build-and-test
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t salob79/bp-frontend:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: docker push salob79/bp-frontend:latest
