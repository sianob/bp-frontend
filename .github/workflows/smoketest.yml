name: SmokeTest

on:
  pull_request:
    branches:
      - main
  # Allow it to be called from ci/cd
  workflow_call:
jobs:
  smoketest:
    runs-on: ubuntu-latest
    name: SmokeTest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          repository: sianob/bp-frontend
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency audit
        run: npm audit --json --audit-level=moderate > npm-audit.json || true

      - name: Convert audit JSON to HTML
        run: node scripts/audit-to-html.cjs

      - name: Upload HTML Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.html
  
      - name: Lint code
        run: npm run lint

      - name: Build project
        run: npm run build

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "frontend"
          format: "HTML"
          path: "./"
          out: "dependency-check-report"

      - name: Upload dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report
